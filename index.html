<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCPA Phone Lookup - CORS Fixed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📞 TCPA Phone Info Search</h1>
        <div class="search-box">
            <input type="text" id="phoneInput" placeholder="Enter 10-digit phone number" maxlength="10">
            <button id="searchBtn">Search</button>
        </div>
        <div id="resultArea" class="result-area">
            <!-- Results will be displayed here -->
            <div class="info-card welcome-message">
                👋 Koi bhi 10-digit number daalein, example: 5052209250
            </div>
        </div>
        <div class="cors-note">
            ⚡ CORS Proxy Active: cors-anywhere.herokuapp.com
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
